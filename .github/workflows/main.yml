name: Build SDL1.2

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          ./configure
          make
          mkdir -p out
          cp build/.libs/libSDL*.so* out/

      - name: Build (Mac)
        if: runner.os == 'macOS'
        run: |
          ./configure
          make
          mkdir -p out
          cp build/.libs/libSDL*.dylib out/

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build
          cmake --build build --config Release
          mkdir out
          cp build/Release/SDL.dll out/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sdl-${{ matrix.os }}
          path: out/
