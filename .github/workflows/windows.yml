name: Build SDL1.2 Windows
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            autoconf
            automake
            libtool
            make

      - name: Build (Windows)
        shell: msys2 {0}
        run: |
          ./configure
          make
          mkdir -p out
          cp build/.libs/SDL.dll out/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sdl-windows
          path: out/
