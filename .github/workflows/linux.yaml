name: Build SDL1.2 Linux

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          ./configure
          make
          mkdir -p out
          cp build/.libs/libSDL*.so* out/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sdl-linux
          path: out/
